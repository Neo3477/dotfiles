"$schema" = "https://yazi-rs.github.io/schemas/yazi.json"

[mgr]
ratio          = [ 1, 3, 4 ]
sort_by        = "natural"
sort_sensitive = false
sort_reverse   = false
sort_dir_first = true
linemode       = "none"
show_hidden    = true
show_symlink   = false
scrolloff      = 5

[preview]
#tab_size        = 4
max_width       = 2560
max_height      = 1440
cache_dir       = ""
image_filter    = "lanczos3"
image_quality   = 90
sixel_fraction  = 10
ueberzug_scale  = 1
ueberzug_offset = [ 10, 10, 10, 10 ]

[[plugin.prepend_previewers]]
url = "*.md"
run = 'piper -- CLICOLOR_FORCE=1 glow -w=$w -s=dark "$1"'

